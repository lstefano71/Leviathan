name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'BenchmarkSuite1/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build Leviathan.slnx -c Release

      - name: Test
        run: |
          dotnet test tests/Leviathan.Core.Tests/Leviathan.Core.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/Leviathan.TUI.Tests/Leviathan.TUI.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/Leviathan.GUI.Tests/Leviathan.GUI.Tests.csproj -c Release --no-build --verbosity normal
