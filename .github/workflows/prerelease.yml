name: Pre-release

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: leviathan-tui2-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: leviathan-tui2-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish AOT
        run: dotnet publish src/Leviathan.TUI2/Leviathan.TUI2.csproj -c Release -r ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src/Leviathan.TUI2/bin/Release/net10.0/${{ matrix.rid }}/publish/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install NBGV
        run: dotnet tool install --global nbgv

      - name: Compute version
        id: version
        run: |
          VERSION=$(nbgv get-version -p src/Leviathan.TUI2 -v NuGetPackageVersion)
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          SHORT_SHA="${GITHUB_SHA::7}"

          TAG="pre-${SLUG}"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG"         >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # Linux tar.gz
          tar -czf "dist/leviathan-tui2_${VERSION}_linux-x64.tar.gz" \
            -C artifacts/leviathan-tui2-linux-x64 .

          # Windows zip
          (cd artifacts/leviathan-tui2-win-x64 && zip -q "../../dist/leviathan-tui2_${VERSION}_win-x64.zip" *)

          # Checksums
          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Delete previous pre-release for this branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SLUG="${{ steps.version.outputs.slug }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"

          NOTES="## Pre-release from branch \`${GITHUB_REF_NAME}\`

          **Version:** \`${VERSION}\`
          **Commit:** [\`${SHORT_SHA}\`](../../commit/${GITHUB_SHA})

          ### Commits since last release
          $(git log --oneline $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD)

          ---
          *This is an automated pre-release build. For stable releases, see the [latest release](../../releases/latest).*"

          gh release create "$TAG" \
            --title "Pre-release: ${SLUG} (${SHORT_SHA})" \
            --notes "$NOTES" \
            --prerelease \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
