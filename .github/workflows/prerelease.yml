name: Pre-release

on:
  push:
    branches-ignore: [main]
    tags-ignore: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            product: tui2
            project: src/Leviathan.TUI2/Leviathan.TUI2.csproj
            artifact: leviathan-tui2-win-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/win-x64/publish/
          - os: ubuntu-latest
            rid: linux-x64
            product: tui2
            project: src/Leviathan.TUI2/Leviathan.TUI2.csproj
            artifact: leviathan-tui2-linux-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/linux-x64/publish/
          - os: windows-latest
            rid: win-x64
            product: gui
            project: src/Leviathan.GUI/Leviathan.GUI.csproj
            artifact: leviathan-gui-win-x64
            publish_path: src/Leviathan.GUI/bin/Release/net10.0/win-x64/publish/
          - os: ubuntu-latest
            rid: linux-x64
            product: gui
            project: src/Leviathan.GUI/Leviathan.GUI.csproj
            artifact: leviathan-gui-linux-x64
            publish_path: src/Leviathan.GUI/bin/Release/net10.0/linux-x64/publish/
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gui:
              - 'src/Leviathan.GUI/**'
            tui2:
              - 'src/Leviathan.TUI2/**'
            core:
              - 'src/Leviathan.Core/**'

      - name: Publish AOT
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.publish_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install NBGV
        run: dotnet tool update --global nbgv

      - name: Compute version
        id: version
        if: ${{ (steps.changes.outputs.tui2 == 'true' && steps.changes.outputs.gui == 'true') || startsWith(github.ref, 'refs/heads/release/') }}
        run: |
          VERSION_TUI2=$(nbgv get-version -p src/Leviathan.TUI2 -v NuGetPackageVersion)
          VERSION_GUI=$(nbgv get-version -p src/Leviathan.GUI -v NuGetPackageVersion)
          if [ "$VERSION_TUI2" != "$VERSION_GUI" ]; then
            echo "Version mismatch between TUI2 ($VERSION_TUI2) and GUI ($VERSION_GUI)" >&2
            exit 1
          fi

          VERSION="$VERSION_TUI2"
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          SHORT_SHA="${GITHUB_SHA::7}"

          TAG="pre-${SLUG}"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG"         >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package archives
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for PRODUCT in tui2 gui; do
            tar -czf "dist/leviathan-${PRODUCT}_${VERSION}_linux-x64.tar.gz" \
              -C "artifacts/leviathan-${PRODUCT}-linux-x64" .
            (cd "artifacts/leviathan-${PRODUCT}-win-x64" && zip -q "../../dist/leviathan-${PRODUCT}_${VERSION}_win-x64.zip" *)
          done

          # Checksums
          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Delete previous pre-release for this branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SLUG="${{ steps.version.outputs.slug }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          HIGHLIGHTS="$(git log --no-merges --pretty=format:'- %s' "${LAST_TAG}..HEAD" | head -n 8)"
          COMMITS="$(git log --oneline "${LAST_TAG}..HEAD" | head -n 30)"

          if [ -z "$HIGHLIGHTS" ]; then
            HIGHLIGHTS="- No notable commit messages found."
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="(no commits since last tag)"
          fi

          NOTES="## Pre-release from branch \`${GITHUB_REF_NAME}\`

          **Version:** \`${VERSION}\`
          **Commit:** [\`${SHORT_SHA}\`](../../commit/${GITHUB_SHA})
          **Assets:** TUI2 + GUI for win-x64 and linux-x64

          ### Highlights
          ${HIGHLIGHTS}

          ### Commits since last release
          ${COMMITS}

          ---
          *This is an automated pre-release build. For stable releases, see the [latest release](../../releases/latest).*"

          gh release create "$TAG" \
            --title "Pre-release: ${SLUG} (${SHORT_SHA})" \
            --notes "$NOTES" \
            --prerelease \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
