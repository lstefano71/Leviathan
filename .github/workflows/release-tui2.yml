name: Release TUI2

on:
  push:
    tags: ["tui2/v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: leviathan-tui2-win-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/win-x64/publish/
          - os: ubuntu-latest
            rid: linux-x64
            artifact: leviathan-tui2-linux-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/linux-x64/publish/
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish AOT
        run: dotnet publish src/Leviathan.TUI2/Leviathan.TUI2.csproj -c Release -r ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.publish_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install NBGV
        run: dotnet tool update --global nbgv

      - name: Compute version
        id: version
        run: |
          VERSION=$(nbgv get-version -p src/Leviathan.TUI2 -v NuGetPackageVersion)
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package archives
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/leviathan-tui2_${VERSION}_linux-x64.tar.gz" \
            -C artifacts/leviathan-tui2-linux-x64 .
          (cd artifacts/leviathan-tui2-win-x64 && zip -qr "../../dist/leviathan-tui2_${VERSION}_win-x64.zip" .)
          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Build highlights
        id: highlights
        run: |
          set -e
          PREV_TAG=$(git tag --sort=-creatordate | grep "^tui2/v" | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          HIGHLIGHTS=$(git log --no-merges --pretty=format:'- %s' "$RANGE" | head -n 8)
          if [ -z "$HIGHLIGHTS" ]; then
            HIGHLIGHTS="- No notable commit messages found."
          fi
          {
            echo "notes<<EOF"
            echo "## Highlights"
            echo
            echo "$HIGHLIGHTS"
            echo
            echo "_Detailed categorized notes follow below._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="${{ steps.highlights.outputs.notes }}

          - TUI2: ${VERSION}"
          gh release create "$TAG" \
            --title "TUI2 ${TAG}" \
            --notes "$NOTES" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
