name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            product: tui2
            project: src/Leviathan.TUI2/Leviathan.TUI2.csproj
            artifact: leviathan-tui2-win-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/win-x64/publish/
          - os: ubuntu-latest
            rid: linux-x64
            product: tui2
            project: src/Leviathan.TUI2/Leviathan.TUI2.csproj
            artifact: leviathan-tui2-linux-x64
            publish_path: src/Leviathan.TUI2/bin/Release/net10.0/linux-x64/publish/
          - os: windows-latest
            rid: win-x64
            product: gui
            project: src/Leviathan.GUI/Leviathan.GUI.csproj
            artifact: leviathan-gui-win-x64
            publish_path: src/Leviathan.GUI/bin/Release/net10.0/win-x64/publish/
          - os: ubuntu-latest
            rid: linux-x64
            product: gui
            project: src/Leviathan.GUI/Leviathan.GUI.csproj
            artifact: leviathan-gui-linux-x64
            publish_path: src/Leviathan.GUI/bin/Release/net10.0/linux-x64/publish/
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish AOT
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.publish_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package archives
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for PRODUCT in tui2 gui; do
            tar -czf "dist/leviathan-${PRODUCT}_${VERSION}_linux-x64.tar.gz" \
              -C "artifacts/leviathan-${PRODUCT}-linux-x64" .
            (cd "artifacts/leviathan-${PRODUCT}-win-x64" && zip -q "../../dist/leviathan-${PRODUCT}_${VERSION}_win-x64.zip" *)
          done

          # Checksums
          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Build highlights
        id: highlights
        run: |
          set -e
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          HIGHLIGHTS=$(git log --no-merges --pretty=format:'- %s' "$RANGE" | head -n 8)
          if [ -z "$HIGHLIGHTS" ]; then
            HIGHLIGHTS="- No notable commit messages found."
          fi

          {
            echo "notes<<EOF"
            echo "## Highlights"
            echo
            echo "$HIGHLIGHTS"
            echo
            echo "_Detailed categorized notes follow below._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes "${{ steps.highlights.outputs.notes }}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
